<title>我的文档</title>

<style>

body{
    font-family:微软雅黑;
}


.folder{
    cursor:pointer;
    font-size:20px;
}


.child{
    display:none;
    margin-left:30px;
}


a{
    text-decoration:none;
}


</style>


<script>

function openFolder(id){

let x=document.getElementById(id);


if(x.style.display=="block"){

x.style.display="none";

}

else{

x.style.display="block";

}

}

</script>


</head>


<body>

onclick="openFolder('one')">
