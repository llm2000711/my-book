<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>律师事务所函生成器</title>
<style>
:root{
  --bg:#f3f5f8; --panel:#ffffff; --ink:#1f2937; --muted:#6b7280;
  --line:#d9dee7; --primary:#1d4ed8; --primary-dark:#1e40af; --danger:#b91c1c;
}
*{box-sizing:border-box}
body{
  margin:0;background:var(--bg);color:var(--ink);
  font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;
}
.app{max-width:1440px;margin:0 auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:18px}
.header h1{margin:0;font-size:26px}
.header p{margin:6px 0 0;color:var(--muted);font-size:14px}
.workspace{display:grid;grid-template-columns:minmax(340px,430px) minmax(620px,1fr);gap:20px;align-items:start}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 8px 25px rgba(31,41,55,.06)}
.form-panel{padding:20px;position:sticky;top:16px}
.section-title{font-size:16px;font-weight:700;margin:0 0 14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
label{font-size:13px;font-weight:650}
.req::after{content:" *";color:var(--danger)}
input,textarea{
  width:100%;border:1px solid #cbd2dc;border-radius:8px;padding:10px 11px;
  font:inherit;font-size:14px;outline:none;background:#fff;color:#111827;
}
textarea{min-height:70px;resize:vertical}
input:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(29,78,216,.12)}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}
button{
  border:0;border-radius:9px;padding:11px 12px;font:inherit;font-weight:700;cursor:pointer;
  transition:.15s ease;
}
button:hover{transform:translateY(-1px)}
.primary{background:var(--primary);color:white}
.primary:hover{background:var(--primary-dark)}
.secondary{background:#e9eef7;color:#263247}
.ghost{background:white;color:#374151;border:1px solid #cbd2dc}
.status{min-height:20px;margin-top:10px;font-size:13px;color:var(--muted)}
.preview-panel{padding:18px;overflow:auto}
.preview-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.preview-toolbar strong{font-size:15px}
.a4-wrap{min-width:620px;display:flex;justify-content:center;padding:8px}
.paper{
  width:210mm;min-height:297mm;background:#fff;box-shadow:0 4px 18px rgba(0,0,0,.16);
  padding:25.4mm 7mm 0.02mm 30mm;position:relative;color:#000;
  font-family:"KaiTi","STKaiti","楷体",serif;font-size:18pt;line-height:1.5;
}
.paper-title{
  margin:0 0 30mm 0;font-family:"SimHei","Heiti SC","黑体",sans-serif;
  font-weight:700;font-size:21pt;line-height:1;text-align:center;
}
.recipient{margin:0 0 8mm 0;line-height:1.1}
.body-text{margin:0;text-indent:2em;line-height:1.5}
.notice{margin:8mm 0 0 0}
.sign-area{margin-top:18mm;text-align:right;padding-right:12mm;line-height:1.8}
.attachment{margin-top:30mm;font-size:18pt;line-height:1.1}.var{display:inline;border-bottom:1.2px solid #000;line-height:1.15;padding:0;margin:0;min-width:0;text-align:center}
.hint{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.55}
@media(max-width:1050px){
  .workspace{grid-template-columns:1fr}
  .form-panel{position:static}
}
@media print{
  @page{size:A4;margin:0}
  body{background:#fff}
  .header,.form-panel,.preview-toolbar{display:none!important}
  .app,.workspace,.preview-panel,.a4-wrap{display:block!important;margin:0!important;padding:0!important;border:0!important;box-shadow:none!important}
  .paper{box-shadow:none!important;margin:0!important;width:210mm;min-height:297mm}
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <h1>律师事务所函生成器</h1>
      <p>依据上传的“所函（诉讼）”模板生成，支持 Word、PDF、HTML 导出。</p>
    </div>
  </div>

  <div class="workspace">
    <section class="panel form-panel">
      <h2 class="section-title">填写函件信息</h2>
      <div class="grid">
        <div class="field full"><label class="req" for="court">受函法院</label><input id="court" placeholder="例如：北京市朝阳区人民法院"></div>
        <div class="field"><label class="req" for="plaintiff">原告 / 申请人</label><input id="plaintiff" placeholder="例如：张三"></div>
        <div class="field"><label class="req" for="defendant">被告 / 被申请人</label><input id="defendant" placeholder="例如：李四"></div>
        <div class="field full"><label class="req" for="cause">案由</label><input id="cause" value="民间借贷纠纷" placeholder="例如：民间借贷纠纷"></div>
        <div class="field"><label class="req" for="client">委托人</label><input id="client" placeholder="例如：张三"></div>
        <div class="field"><label class="req" for="lawyer">承办律师</label><input id="lawyer" placeholder="例如：王律师"></div>
        <div class="field full"><label class="req" for="firm">律师事务所</label><input id="firm" placeholder="例如：北京某某律师事务所"></div>
        <div class="field"><label class="req" for="date">出函日期</label><input id="date" type="date"></div>
        <div class="field"><label for="attachment">附件说明</label><input id="attachment" value="授权委托书一份"></div>
        <div class="field full"><label for="customText">自定义正文（留空使用标准正文）</label><textarea id="customText" placeholder="可选。支持变量：{{原告}}、{{被告}}、{{案由}}、{{委托人}}、{{律师}}"></textarea></div>
      </div>

      <div class="actions">
        <button class="primary" id="wordBtn">导出 Word</button>
        <button class="primary" id="pdfBtn">导出 PDF</button>
        <button class="secondary" id="htmlBtn">导出 HTML</button>
        <button class="ghost" id="sampleBtn">填入示例</button>
        <button class="ghost" id="resetBtn" style="grid-column:1/-1">清空表单</button>
      </div>
      <div class="status" id="status"></div>
      <div class="hint">PDF 按钮会打开浏览器打印窗口，请选择“另存为 PDF”。Word 导出为标准 .docx 文件，可在 Microsoft Word、WPS 中打开。</div>
    </section>

    <section class="panel preview-panel">
      <div class="preview-toolbar">
        <strong>实时预览（A4）</strong>
        <span style="font-size:12px;color:#6b7280">内容修改后自动更新</span>
      </div>
      <div class="a4-wrap">
        <article class="paper" id="paper">
          <h1 class="paper-title">律师事务所函</h1>
          <p class="recipient"><span class="var" id="vCourt">XXX人民法院</span>：</p>
          <p class="body-text">贵院受理的<span class="var" id="vPlaintiff">XX</span>诉<span class="var" id="vDefendant">XX</span><span class="var" id="vCause">民间借贷纠纷</span>一案，本所接受<span class="var" id="vClient">XX</span>的委托，指派<span class="var" id="vLawyer">XXX</span>律师担任其诉讼代理人。</p>
          <p class="body-text" id="vCustomBody" style="display:none"></p>
          <p class="notice">特此函告。</p>
          <div class="sign-area">
            <div><span id="vFirm">北京XX律师事务所</span></div>
            <div><span id="vDate">2026年×月×日</span></div>
          </div>
          <div class="attachment">附：<span class="var" id="vAttachment">授权委托书一份</span></div>
        </article>
      </div>
    </section>
  </div>
</div>

<script>
const ids = ["court","plaintiff","defendant","cause","client","lawyer","firm","date","attachment","customText"];
const $ = id => document.getElementById(id);

function escapeXml(s){
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&apos;");
}
function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function cnDate(value){
  if(!value) return "2026年×月×日";
  const [y,m,d] = value.split("-");
  return `${y}年${Number(m)}月${Number(d)}日`;
}
function values(){
  return Object.fromEntries(ids.map(id => [id, $(id).value.trim()]));
}
function standardBody(v){
  return `贵院受理的${v.plaintiff || "XX"}诉${v.defendant || "XX"}${v.cause || "民间借贷纠纷"}一案，本所接受${v.client || "XX"}的委托，指派${v.lawyer || "XXX"}律师担任其诉讼代理人。`;
}
function bodyText(v){
  if(!v.customText) return standardBody(v);
  return v.customText
    .replaceAll("{{原告}}",v.plaintiff || "XX")
    .replaceAll("{{被告}}",v.defendant || "XX")
    .replaceAll("{{案由}}",v.cause || "民间借贷纠纷")
    .replaceAll("{{委托人}}",v.client || "XX")
    .replaceAll("{{律师}}",v.lawyer || "XXX");
}
function updatePreview(){
  const v=values();
  const setText=(id,value)=>{const el=$(id);if(el)el.textContent=value;};
  setText("vCourt",v.court || "XXX人民法院");
  setText("vPlaintiff",v.plaintiff || "XX");
  setText("vDefendant",v.defendant || "XX");
  setText("vCause",v.cause || "民间借贷纠纷");
  setText("vClient",v.client || "XX");
  setText("vLawyer",v.lawyer || "XXX");
  setText("vFirm",v.firm || "北京XX律师事务所");
  setText("vDate",cnDate(v.date));
  setText("vAttachment",v.attachment || "授权委托书一份");

  const custom=$("vCustomBody");
  const standard=$("vPlaintiff")?.closest(".body-text");
  if(custom && standard){
    if(v.customText){
      custom.textContent=bodyText(v);
      custom.style.display="block";
      standard.style.display="none";
    }else{
      custom.textContent="";
      custom.style.display="none";
      standard.style.display="block";
    }
  }
  localStorage.setItem("lawFirmLetterData",JSON.stringify(v));
}
function validate(){
  const v=values();
  const names={court:"受函法院",plaintiff:"原告 / 申请人",defendant:"被告 / 被申请人",cause:"案由",client:"委托人",lawyer:"承办律师",firm:"律师事务所",date:"出函日期"};
  const missing=Object.keys(names).filter(k=>!v[k]);
  if(missing.length){
    $("status").textContent="请先填写："+missing.map(k=>names[k]).join("、");
    $("status").style.color="#b91c1c";
    $(missing[0]).focus();
    return false;
  }
  $("status").textContent="";
  return true;
}
function filename(ext){
  const v=values();
  const safe=(v.plaintiff || "当事人").replace(/[\\/:*?"<>|]/g,"_");
  return `律师事务所函_${safe}_${v.date || "未填写日期"}.${ext}`;
}
function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function setStatus(msg){
  $("status").textContent=msg;$("status").style.color="#166534";
}

/* Minimal ZIP writer (store mode) for standards-compliant DOCX generation. */
function crc32(bytes){
  let table=crc32.table;
  if(!table){
    table=crc32.table=new Uint32Array(256);
    for(let n=0;n<256;n++){
      let c=n;
      for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);
      table[n]=c>>>0;
    }
  }
  let c=0xFFFFFFFF;
  for(const b of bytes)c=table[(c^b)&0xFF]^(c>>>8);
  return (c^0xFFFFFFFF)>>>0;
}
function u16(n){return [n&255,(n>>>8)&255]}
function u32(n){return [n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255]}
function makeZip(files){
  const enc=new TextEncoder(), chunks=[], central=[];
  let offset=0;
  for(const [name,content] of Object.entries(files)){
    const nb=enc.encode(name), data=enc.encode(content), crc=crc32(data);
    const local=new Uint8Array([
      ...u32(0x04034b50),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0),...nb
    ]);
    chunks.push(local,data);
    central.push(new Uint8Array([
      ...u32(0x02014b50),...u16(20),...u16(20),...u16(0),...u16(0),...u16(0),...u16(0),
      ...u32(crc),...u32(data.length),...u32(data.length),...u16(nb.length),...u16(0),...u16(0),
      ...u16(0),...u16(0),...u32(0),...u32(offset),...nb
    ]));
    offset += local.length+data.length;
  }
  const centralSize=central.reduce((s,a)=>s+a.length,0), count=central.length;
  const end=new Uint8Array([
    ...u32(0x06054b50),...u16(0),...u16(0),...u16(count),...u16(count),
    ...u32(centralSize),...u32(offset),...u16(0)
  ]);
  return new Blob([...chunks,...central,end],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
}
function wParagraph(text,opts={}){
  const align=opts.align?`<w:jc w:val="${opts.align}"/>`:"";
  const indent=opts.firstLine?`<w:ind w:firstLine="${opts.firstLine}"/>`:(opts.right?`<w:ind w:right="${opts.right}"/>`:"");
  const spacing=`<w:spacing w:before="${opts.before||0}" w:after="${opts.after||0}" w:line="${opts.line||360}" w:lineRule="auto"/>`;
  const ppr=`<w:pPr>${spacing}${indent}${align}</w:pPr>`;
  const font=opts.font || "楷体";
  const size=opts.size || 36;
  const bold=opts.bold?"<w:b/>":"";
  const underline=opts.underline?"<w:u w:val=\"single\"/>":"";
  const rpr=`<w:rPr><w:rFonts w:ascii="${font}" w:eastAsia="${font}" w:hAnsi="${font}"/>${bold}${underline}<w:sz w:val="${size}"/><w:szCs w:val="${size}"/></w:rPr>`;
  return `<w:p>${ppr}<w:r>${rpr}<w:t xml:space="preserve">${escapeXml(text)}</w:t></w:r></w:p>`;
}
function wRun(text,opts={}){
  const font=opts.font || "楷体", size=opts.size || 36;
  const bold=opts.bold?"<w:b/>":"";
  const underline=opts.underline?'<w:u w:val="single"/>':"";
  return `<w:r><w:rPr><w:rFonts w:ascii="${font}" w:eastAsia="${font}" w:hAnsi="${font}"/>${bold}${underline}<w:sz w:val="${size}"/><w:szCs w:val="${size}"/></w:rPr><w:t xml:space="preserve">${escapeXml(text)}</w:t></w:r>`;
}
function wMixedParagraph(runs,opts={}){
  const align=opts.align?`<w:jc w:val="${opts.align}"/>`:"";
  const indent=opts.firstLine?`<w:ind w:firstLine="${opts.firstLine}"/>`:(opts.right?`<w:ind w:right="${opts.right}"/>`:"");
  const spacing=`<w:spacing w:before="${opts.before||0}" w:after="${opts.after||0}" w:line="${opts.line||360}" w:lineRule="auto"/>`;
  return `<w:p><w:pPr>${spacing}${indent}${align}</w:pPr>${runs.join("")}</w:p>`;
}
function docxFiles(v){
  const body=bodyText(v);
  const doc=`<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>
${wParagraph("",{line:445})}
${wParagraph("律师事务所函",{font:"黑体",size:42,bold:true,line:220,before:126,align:"center"})}
${wParagraph("",{line:289})}${wParagraph("",{line:289})}${wParagraph("",{line:289})}
${wMixedParagraph([wRun(v.court,{underline:true}),wRun("：")],{line:256})}
${wParagraph("",{line:256})}
${v.customText ? wParagraph(body,{firstLine:720,line:360}) : wMixedParagraph([
  wRun("贵院受理的"),wRun(v.plaintiff,{underline:true}),wRun("诉"),wRun(v.defendant,{underline:true}),
  wRun(v.cause,{underline:true}),wRun("一案，本所接受"),wRun(v.client,{underline:true}),
  wRun("的委托，指派"),wRun(v.lawyer,{underline:true}),wRun("律师担任其诉讼代理人。")
],{firstLine:720,line:360})}
${wParagraph("",{line:360})}
${wParagraph("特此函告。",{line:360})}
${wParagraph("",{line:360})}${wParagraph("",{line:360})}
${wParagraph(v.firm,{align:"right",right:700,line:360})}
${wParagraph("",{line:256})}
${wParagraph(cnDate(v.date),{align:"right",right:700,line:256})}
${wParagraph("",{line:256})}${wParagraph("",{line:256})}${wParagraph("",{line:256})}
${wParagraph("",{line:257})}${wParagraph("",{line:257})}
${wMixedParagraph([wRun("附："),wRun(v.attachment||"授权委托书一份",{underline:true})],{line:229,before:110})}
<w:sectPr>
<w:pgSz w:w="11906" w:h="16838"/>
<w:pgMar w:top="1440" w:right="425" w:bottom="1" w:left="1800" w:header="851" w:footer="992" w:gutter="0"/>
</w:sectPr>
</w:body></w:document>`;
  return {
    "[Content_Types].xml":`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/><Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/></Types>`,
    "_rels/.rels":`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/><Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/><Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/></Relationships>`,
    "word/document.xml":doc,
    "word/_rels/document.xml.rels":`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"></Relationships>`,
    "docProps/core.xml":`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"><dc:title>律师事务所函</dc:title><dc:creator>律师事务所函生成器</dc:creator><cp:lastModifiedBy>律师事务所函生成器</cp:lastModifiedBy><dcterms:created xsi:type="dcterms:W3CDTF">${new Date().toISOString()}</dcterms:created></cp:coreProperties>`,
    "docProps/app.xml":`<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Properties xmlns="http://schemas.openxmlformats.org/officeDocument/2006/extended-properties" xmlns:vt="http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes"><Application>律师事务所函生成器</Application></Properties>`
  };
}
function exportWord(){
  if(!validate())return;
  const v=values();
  downloadBlob(makeZip(docxFiles(v)),filename("docx"));
  setStatus("Word 文件已生成。");
}
function exportPdf(){
  if(!validate())return;
  setStatus("正在打开打印窗口，请选择“另存为 PDF”。");
  setTimeout(()=>window.print(),100);
}
function standaloneHtml(v){
  const body=escapeHtml(bodyText(v));
  return `<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>律师事务所函</title>
<style>@page{size:A4;margin:0}body{margin:0;background:#eee}.paper{box-sizing:border-box;width:210mm;min-height:297mm;margin:12px auto;background:#fff;padding:25.4mm 7mm 0 30mm;color:#000;font-family:KaiTi,STKaiti,"楷体",serif;font-size:18pt;line-height:1.5}.title{margin:0 0 30mm;font-family:SimHei,"黑体",sans-serif;font-size:21pt;line-height:1;text-align:center}.recipient{margin:0 0 8mm;line-height:1.1}.body{margin:0;text-indent:2em}.notice{margin-top:8mm}.sign{margin-top:18mm;text-align:right;padding-right:12mm;line-height:1.8}.attachment{margin-top:30mm;line-height:1.1}.var{display:inline;border-bottom:1.2px solid #000;line-height:1.15;padding:0;margin:0;min-width:0;text-align:center}@media print{body{background:#fff}.paper{margin:0}}</style></head>
<body><article class="paper"><h1 class="title">律师事务所函</h1><p class="recipient"><span class="var">${escapeHtml(v.court)}</span>：</p>${v.customText?`<p class="body">${body}</p>`:`<p class="body">贵院受理的<span class="var">${escapeHtml(v.plaintiff)}</span>诉<span class="var">${escapeHtml(v.defendant)}</span><span class="var">${escapeHtml(v.cause)}</span>一案，本所接受<span class="var">${escapeHtml(v.client)}</span>的委托，指派<span class="var">${escapeHtml(v.lawyer)}</span>律师担任其诉讼代理人。</p>`}<p class="notice">特此函告。</p><div class="sign"><div>${escapeHtml(v.firm)}</div><div>${escapeHtml(cnDate(v.date))}</div></div><div class="attachment">附：<span class="var">${escapeHtml(v.attachment||"授权委托书一份")}</span></div></article></body></html>`;
}
function exportHtml(){
  if(!validate())return;
  const v=values();
  downloadBlob(new Blob([standaloneHtml(v)],{type:"text/html;charset=utf-8"}),filename("html"));
  setStatus("HTML 文件已生成。");
}
ids.forEach(id=>{const el=$(id);el.addEventListener("input",updatePreview);el.addEventListener("change",updatePreview);});
$("wordBtn").addEventListener("click",exportWord);
$("pdfBtn").addEventListener("click",exportPdf);
$("htmlBtn").addEventListener("click",exportHtml);
$("sampleBtn").addEventListener("click",()=>{
  const today=new Date(), pad=n=>String(n).padStart(2,"0");
  const sample={court:"北京市朝阳区人民法院",plaintiff:"张三",defendant:"李四",cause:"民间借贷纠纷",client:"张三",lawyer:"王明",firm:"北京明德律师事务所",date:`${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`,attachment:"授权委托书一份",customText:""};
  Object.entries(sample).forEach(([k,v])=>$(k).value=v);updatePreview();setStatus("已填入示例数据。");
});
$("resetBtn").addEventListener("click",()=>{
  if(!confirm("确定清空全部内容吗？"))return;
  ids.forEach(id=>$(id).value="");$("cause").value="民间借贷纠纷";$("attachment").value="授权委托书一份";
  localStorage.removeItem("lawFirmLetterData");updatePreview();setStatus("表单已清空。");
});
try{
  const saved=JSON.parse(localStorage.getItem("lawFirmLetterData")||"null");
  if(saved) Object.entries(saved).forEach(([k,v])=>{if($(k))$(k).value=v});
}catch(e){}
if(!$("date").value){
  const d=new Date(),pad=n=>String(n).padStart(2,"0");
  $("date").value=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
updatePreview();
</script>
