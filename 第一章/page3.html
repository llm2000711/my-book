<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>财务报表智能分析工具</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#6b7280;--primary:#2563eb;
      --primary2:#1d4ed8;--border:#e5e7eb;--good:#059669;--warn:#d97706;--bad:#dc2626;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{max-width:1500px;margin:auto;padding:24px}
    .hero{background:linear-gradient(135deg,#172554,#2563eb);color:#fff;border-radius:20px;padding:28px 32px;box-shadow:var(--shadow)}
    .hero h1{margin:0 0 8px;font-size:28px}.hero p{margin:0;opacity:.85;line-height:1.7}
    .toolbar{display:flex;flex-wrap:wrap;gap:12px;margin:18px 0}
    button,.btn{border:0;border-radius:10px;padding:11px 16px;font-size:14px;cursor:pointer;transition:.2s}
    .primary{background:var(--primary);color:#fff}.primary:hover{background:var(--primary2)}
    .secondary{background:#fff;color:var(--text);border:1px solid var(--border)}
    .danger{background:#fff;color:var(--bad);border:1px solid #fecaca}
    input[type=file]{display:none}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:0 4px 16px rgba(15,23,42,.04)}
    .span-12{grid-column:span 12}.span-8{grid-column:span 8}.span-6{grid-column:span 6}.span-4{grid-column:span 4}
    .section-title{font-size:17px;font-weight:700;margin:0 0 14px;display:flex;align-items:center;justify-content:space-between}
    .muted{color:var(--muted);font-size:13px}
    .dropzone{border:2px dashed #93c5fd;background:#eff6ff;border-radius:14px;padding:34px;text-align:center;cursor:pointer}
    .dropzone.drag{background:#dbeafe;border-color:var(--primary)}
    .dropzone strong{display:block;font-size:17px;margin-bottom:8px}
    .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .kpi{border:1px solid var(--border);border-radius:14px;padding:15px;background:#fafcff}
    .kpi .name{color:var(--muted);font-size:13px}.kpi .value{font-size:23px;font-weight:750;margin-top:8px}.kpi .sub{font-size:12px;margin-top:7px}
    .good{color:var(--good)}.warn{color:var(--warn)}.bad{color:var(--bad)}
    .table-wrap{overflow:auto;max-height:480px;border:1px solid var(--border);border-radius:12px}
    table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
    th,td{padding:10px 12px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:right}
    th{position:sticky;top:0;background:#f8fafc;z-index:1}
    th:first-child,td:first-child{text-align:left}
    tr:hover td{background:#f8fbff}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
    .tab{padding:8px 12px;border-radius:999px;background:#f1f5f9;color:#475569;cursor:pointer;font-size:13px}
    .tab.active{background:#dbeafe;color:#1d4ed8;font-weight:700}
    .insights{display:grid;gap:10px}.insight{border-left:4px solid var(--primary);background:#f8fafc;border-radius:8px;padding:12px 14px;line-height:1.65}
    .status{padding:10px 14px;border-radius:10px;background:#fff;border:1px solid var(--border);font-size:13px}
    .mapping{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    select,input[type=text]{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:9px;background:#fff}
    canvas{max-height:330px}
    .hidden{display:none}
    footer{text-align:center;color:var(--muted);font-size:12px;margin:24px 0}
    @media(max-width:1000px){.span-8,.span-6,.span-4{grid-column:span 12}.kpis{grid-template-columns:repeat(2,1fr)}.mapping{grid-template-columns:1fr}}
    @media(max-width:600px){.app{padding:12px}.hero{padding:22px}.kpis{grid-template-columns:1fr}}
    @media print {.toolbar,.dropzone,.tabs,.mapping-area{display:none!important}.app{max-width:none;padding:0}.card,.hero{box-shadow:none;break-inside:avoid}}
  </style>
</head>
<body>
<div class="app">
  <section class="hero">
    <h1>财务报表智能分析工具</h1>
    <p>导入 Excel 后自动识别期间、项目与金额，生成盈利能力、偿债能力、营运能力、成长性和现金流分析。</p>
  </section>

  <div class="toolbar">
    <label class="btn primary" for="fileInput">导入 Excel</label>
    <input id="fileInput" type="file" accept=".xlsx,.xls,.csv" />
    <button class="secondary" id="loadDemo">加载示例数据</button>
    <button class="secondary" id="exportExcel">导出分析 Excel</button>
    <button class="secondary" id="exportJson">导出 JSON</button>
    <button class="secondary" id="exportCsv">导出指标 CSV</button>
    <button class="secondary" id="printReport">打印 / 导出 PDF</button>
    <button class="danger" id="resetBtn">重置</button>
  </div>

  <div id="status" class="status">尚未导入文件。支持多工作表 Excel，优先识别资产负债表、利润表和现金流量表。</div>

  <div class="grid" style="margin-top:16px">
    <section class="card span-12">
      <div id="dropzone" class="dropzone">
        <strong>拖拽 Excel 文件到这里，或点击选择文件</strong>
        <span class="muted">支持 .xlsx、.xls、.csv；推荐首列为财务项目，后续列为各期间金额。</span>
      </div>
    </section>

    <section id="mappingCard" class="card span-12 mapping-area hidden">
      <h2 class="section-title">数据识别与映射 <span class="muted">自动识别不准确时可手动调整</span></h2>
      <div class="mapping">
        <div><label class="muted">工作表</label><select id="sheetSelect"></select></div>
        <div><label class="muted">项目名称列</label><select id="itemColSelect"></select></div>
        <div><label class="muted">数据起始行</label><input id="startRowInput" type="text" value="2"></div>
      </div>
      <div style="margin-top:12px"><button class="primary" id="reanalyzeBtn">按当前映射重新分析</button></div>
    </section>

    <section id="kpiCard" class="card span-12 hidden">
      <h2 class="section-title">核心指标概览 <span id="latestPeriod" class="muted"></span></h2>
      <div id="kpis" class="kpis"></div>
    </section>

    <section id="trendCard" class="card span-8 hidden">
      <h2 class="section-title">收入与利润趋势</h2>
      <canvas id="trendChart"></canvas>
    </section>

    <section id="structureCard" class="card span-4 hidden">
      <h2 class="section-title">资产结构</h2>
      <canvas id="structureChart"></canvas>
    </section>

    <section id="ratioCard" class="card span-6 hidden">
      <h2 class="section-title">关键财务比率</h2>
      <canvas id="ratioChart"></canvas>
    </section>

    <section id="cashCard" class="card span-6 hidden">
      <h2 class="section-title">现金流趋势</h2>
      <canvas id="cashChart"></canvas>
    </section>

    <section id="insightCard" class="card span-12 hidden">
      <h2 class="section-title">自动分析结论</h2>
      <div id="insights" class="insights"></div>
    </section>

    <section id="dataCard" class="card span-12 hidden">
      <h2 class="section-title">原始数据预览</h2>
      <div id="sheetTabs" class="tabs"></div>
      <div id="tableWrap" class="table-wrap"></div>
    </section>
  </div>
  <footer>本工具提供辅助分析，不构成审计、投资、税务或法律意见。数据仅在当前浏览器中处理。</footer>
</div>

<script>
const $ = s => document.querySelector(s);
let workbook = null, workbookData = {}, analysis = null;
let charts = {};

const aliases = {
  revenue:['营业收入','主营业务收入','销售收入','收入合计','revenue','sales'],
  cost:['营业成本','主营业务成本','销售成本','cost of sales','cogs'],
  grossProfit:['毛利','gross profit'],
  operatingProfit:['营业利润','经营利润','operating profit','ebit'],
  netProfit:['净利润','归属于母公司股东的净利润','利润净额','net profit','net income'],
  totalAssets:['资产总计','总资产','total assets'],
  currentAssets:['流动资产合计','流动资产','current assets'],
  cash:['货币资金','现金及现金等价物','cash and cash equivalents','cash'],
  inventory:['存货','inventory'],
  receivables:['应收账款','应收票据及应收账款','accounts receivable','receivables'],
  totalLiabilities:['负债合计','总负债','total liabilities'],
  currentLiabilities:['流动负债合计','流动负债','current liabilities'],
  equity:['所有者权益合计','股东权益合计','净资产','total equity','shareholders equity'],
  operatingCashFlow:['经营活动产生的现金流量净额','经营现金流量净额','经营活动现金流净额','operating cash flow'],
  investingCashFlow:['投资活动产生的现金流量净额','投资现金流量净额','investing cash flow'],
  financingCashFlow:['筹资活动产生的现金流量净额','融资活动现金流量净额','financing cash flow'],
  depreciation:['折旧与摊销','固定资产折旧','depreciation and amortization'],
  interestExpense:['利息费用','财务费用-利息费用','interest expense']
};

function normalize(s){return String(s??'').toLowerCase().replace(/[\s,，:：()（）\[\]【】\-_/]/g,'')}
function toNum(v){
  if(v===null||v===undefined||v==='') return null;
  if(typeof v==='number') return isFinite(v)?v:null;
  let s=String(v).trim().replace(/,/g,'').replace(/，/g,'');
  let neg=/^\(.*\)$/.test(s); s=s.replace(/[()%￥¥$]/g,'');
  let mult=1;
  if(/亿$/.test(s)){mult=1e8;s=s.replace(/亿$/,'')}
  else if(/万$/.test(s)){mult=1e4;s=s.replace(/万$/,'')}
  let n=parseFloat(s); if(!isFinite(n)) return null;
  return (neg?-n:n)*mult;
}
function fmt(n, pct=false){
  if(n===null||n===undefined||!isFinite(n)) return '—';
  if(pct) return (n*100).toFixed(2)+'%';
  let a=Math.abs(n);
  if(a>=1e8) return (n/1e8).toFixed(2)+'亿';
  if(a>=1e4) return (n/1e4).toFixed(2)+'万';
  return n.toLocaleString('zh-CN',{maximumFractionDigits:2});
}
function matchKey(label){
  const n=normalize(label);
  for(const [key,list] of Object.entries(aliases)){
    if(list.some(a=>n===normalize(a)||n.includes(normalize(a)))) return key;
  }
  return null;
}
function growth(curr, prev){return curr!=null&&prev!=null&&prev!==0?(curr-prev)/Math.abs(prev):null}
function ratio(a,b){return a!=null&&b!=null&&b!==0?a/b:null}

function parseWorkbook(wb){
  workbookData={};
  wb.SheetNames.forEach(name=>{
    workbookData[name]=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,defval:null,raw:true});
  });
  populateMapping();
  renderSheetTabs();
  autoAnalyzeAllSheets();
}
function populateMapping(){
  const names=Object.keys(workbookData);
  $('#sheetSelect').innerHTML=names.map(n=>`<option>${escapeHtml(n)}</option>`).join('');
  updateColSelect();
  $('#mappingCard').classList.remove('hidden');
}
function colName(i){let s='';for(i++;i;i=Math.floor((i-1)/26))s=String.fromCharCode((i-1)%26+65)+s;return s}
function updateColSelect(){
  const rows=workbookData[$('#sheetSelect').value]||[];
  const max=Math.max(1,...rows.slice(0,10).map(r=>r.length));
  $('#itemColSelect').innerHTML=Array.from({length:max},(_,i)=>`<option value="${i}">${colName(i)} 列</option>`).join('');
}
function detectHeaderRow(rows){
  let best=0,score=-1;
  rows.slice(0,15).forEach((r,i)=>{
    const numeric=r.filter(v=>toNum(v)!==null).length;
    const text=r.filter(v=>typeof v==='string'&&v.trim()).length;
    const s=text*2+numeric;
    if(s>score){score=s;best=i}
  });
  return best;
}
function parseSheet(rows, forcedItemCol=null, forcedStartRow=null){
  if(!rows.length) return null;
  const headerRow=forcedStartRow!=null?Math.max(0,forcedStartRow-2):detectHeaderRow(rows);
  const header=rows[headerRow]||[];
  let itemCol=forcedItemCol!=null?forcedItemCol:0;
  if(forcedItemCol==null){
    let best=-1;
    for(let c=0;c<Math.min(5,Math.max(...rows.map(r=>r.length)));c++){
      let score=0;
      for(let r=headerRow+1;r<Math.min(rows.length,headerRow+40);r++){
        if(typeof rows[r]?.[c]==='string'&&matchKey(rows[r][c])) score+=3;
        else if(typeof rows[r]?.[c]==='string') score++;
      }
      if(score>best){best=score;itemCol=c}
    }
  }
  let periodCols=[];
  for(let c=0;c<header.length;c++){
    if(c===itemCol) continue;
    let numericCount=0;
    for(let r=headerRow+1;r<Math.min(rows.length,headerRow+50);r++) if(toNum(rows[r]?.[c])!==null) numericCount++;
    if(numericCount>=2) periodCols.push(c);
  }
  if(!periodCols.length){
    const width=Math.max(...rows.map(r=>r.length));
    periodCols=Array.from({length:width},(_,i)=>i).filter(i=>i!==itemCol);
  }
  const periods=periodCols.map((c,i)=>String(header[c]??`期间${i+1}`));
  const metrics={};
  const rawItems=[];
  for(let r=headerRow+1;r<rows.length;r++){
    const label=rows[r]?.[itemCol];
    if(label===null||label===undefined||String(label).trim()==='') continue;
    const vals=periodCols.map(c=>toNum(rows[r]?.[c]));
    if(vals.every(v=>v===null)) continue;
    rawItems.push({label:String(label),values:vals});
    const key=matchKey(label);
    if(key&&!metrics[key]) metrics[key]=vals;
  }
  return {headerRow,itemCol,periodCols,periods,metrics,rawItems};
}
function autoAnalyzeAllSheets(){
  const parsed=Object.entries(workbookData).map(([name,rows])=>({name,data:parseSheet(rows)})).filter(x=>x.data);
  let periods=[], merged={}, sources=[];
  parsed.forEach(({name,data})=>{
    if(data.periods.length>periods.length) periods=data.periods;
    Object.entries(data.metrics).forEach(([k,v])=>{
      if(!merged[k]||v.filter(x=>x!=null).length>merged[k].filter(x=>x!=null).length){merged[k]=v;sources.push(`${k}:${name}`)}
    });
  });
  analysis=buildAnalysis(periods,merged,sources);
  renderAnalysis();
}
function analyzeSelectedSheet(){
  const name=$('#sheetSelect').value, rows=workbookData[name]||[];
  const itemCol=Number($('#itemColSelect').value||0);
  const startRow=Number($('#startRowInput').value||2);
  const d=parseSheet(rows,itemCol,startRow);
  analysis=buildAnalysis(d.periods,d.metrics,[name]);
  renderAnalysis();
}
function buildAnalysis(periods,m,sources){
  const n=periods.length;
  const series=(key)=>Array.from({length:n},(_,i)=>m[key]?.[i]??null);
  const out={periods,metrics:m,sources,ratios:{},insights:[]};
  out.ratios.grossMargin=series('revenue').map((v,i)=>ratio((m.grossProfit?.[i] ?? (v!=null&&m.cost?.[i]!=null?v-m.cost[i]:null)),v));
  out.ratios.netMargin=series('revenue').map((v,i)=>ratio(m.netProfit?.[i],v));
  out.ratios.roe=series('equity').map((v,i)=>ratio(m.netProfit?.[i],v));
  out.ratios.roa=series('totalAssets').map((v,i)=>ratio(m.netProfit?.[i],v));
  out.ratios.debtRatio=series('totalAssets').map((v,i)=>ratio(m.totalLiabilities?.[i],v));
  out.ratios.currentRatio=series('currentLiabilities').map((v,i)=>ratio(m.currentAssets?.[i],v));
  out.ratios.quickRatio=series('currentLiabilities').map((v,i)=>ratio((m.currentAssets?.[i]!=null?m.currentAssets[i]-(m.inventory?.[i]||0):null),v));
  out.ratios.assetTurnover=series('totalAssets').map((v,i)=>ratio(m.revenue?.[i],v));
  out.ratios.receivableTurnover=series('receivables').map((v,i)=>ratio(m.revenue?.[i],v));
  out.ratios.inventoryTurnover=series('inventory').map((v,i)=>ratio(m.cost?.[i],v));
  out.growth={
    revenue:series('revenue').map((v,i)=>i?growth(v,m.revenue?.[i-1]):null),
    netProfit:series('netProfit').map((v,i)=>i?growth(v,m.netProfit?.[i-1]):null),
    assets:series('totalAssets').map((v,i)=>i?growth(v,m.totalAssets?.[i-1]):null)
  };
  generateInsights(out);
  return out;
}
function latest(arr){for(let i=(arr?.length||0)-1;i>=0;i--) if(arr[i]!=null)return arr[i];return null}
function generateInsights(a){
  const i=a.periods.length-1,m=a.metrics,r=a.ratios,g=a.growth,ins=[];
  const gm=latest(r.grossMargin),nm=latest(r.netMargin),dr=latest(r.debtRatio),cr=latest(r.currentRatio);
  const rg=latest(g.revenue),ng=latest(g.netProfit),ocf=latest(m.operatingCashFlow),np=latest(m.netProfit);
  if(rg!=null) ins.push({type:rg>=0?'good':'bad',text:`营业收入同比${rg>=0?'增长':'下降'} ${fmt(Math.abs(rg),true)}，反映主营业务规模${rg>=0?'扩张':'收缩'}。`});
  if(ng!=null) ins.push({type:ng>=0?'good':'bad',text:`净利润同比${ng>=0?'增长':'下降'} ${fmt(Math.abs(ng),true)}，盈利趋势${ng>=0?'改善':'承压'}。`});
  if(gm!=null) ins.push({type:gm>=.3?'good':gm>=.15?'warn':'bad',text:`最新毛利率为 ${fmt(gm,true)}。${gm>=.3?'产品或服务的盈利空间较好。':gm>=.15?'盈利空间处于中等水平，建议关注成本变化。':'毛利空间偏低，应重点检查定价与成本控制。'}`});
  if(nm!=null) ins.push({type:nm>=.1?'good':nm>=.03?'warn':'bad',text:`最新净利率为 ${fmt(nm,true)}。${nm>=.1?'整体费用控制和盈利质量较好。':nm>=.03?'盈利能力一般，仍有改善空间。':'净利润转化能力偏弱。'}`});
  if(dr!=null) ins.push({type:dr<=.5?'good':dr<=.7?'warn':'bad',text:`资产负债率为 ${fmt(dr,true)}。${dr<=.5?'资本结构相对稳健。':dr<=.7?'杠杆水平偏高，需要结合现金流判断风险。':'债务负担较重，偿债压力值得重点关注。'}`});
  if(cr!=null) ins.push({type:cr>=1.5?'good':cr>=1?'warn':'bad',text:`流动比率为 ${cr.toFixed(2)}。${cr>=1.5?'短期偿债能力较充足。':cr>=1?'短期偿债能力基本可控。':'流动资产不足以覆盖流动负债，需警惕流动性风险。'}`});
  if(ocf!=null&&np!=null) ins.push({type:ocf>=np?'good':ocf>=0?'warn':'bad',text:`经营现金流为 ${fmt(ocf)}，净利润为 ${fmt(np)}。${ocf>=np?'利润具有较好的现金支撑。':ocf>=0?'经营现金流为正，但低于净利润，应关注应收款与存货占用。':'经营现金流为负，盈利质量和资金周转可能存在压力。'}`});
  if(!ins.length) ins.push({type:'warn',text:'未识别到足够的标准财务项目。请检查项目名称、表头行或使用“数据识别与映射”重新分析。'});
  a.insights=ins;
}
function showCards(){['kpiCard','trendCard','structureCard','ratioCard','cashCard','insightCard','dataCard'].forEach(id=>$('#'+id).classList.remove('hidden'))}
function renderAnalysis(){
  if(!analysis) return;
  showCards();
  const i=analysis.periods.length-1,m=analysis.metrics,r=analysis.ratios,g=analysis.growth;
  $('#latestPeriod').textContent=analysis.periods[i]?`最新期间：${analysis.periods[i]}`:'';
  const specs=[
    ['营业收入',latest(m.revenue),latest(g.revenue),false],
    ['净利润',latest(m.netProfit),latest(g.netProfit),false],
    ['毛利率',latest(r.grossMargin),null,true],
    ['净利率',latest(r.netMargin),null,true],
    ['资产负债率',latest(r.debtRatio),null,true],
    ['流动比率',latest(r.currentRatio),null,false],
    ['净资产收益率 ROE',latest(r.roe),null,true],
    ['经营现金流',latest(m.operatingCashFlow),null,false]
  ];
  $('#kpis').innerHTML=specs.map(([name,val,sub,pct])=>{
    let cls=''; if(sub!=null) cls=sub>=0?'good':'bad';
    return `<div class="kpi"><div class="name">${name}</div><div class="value">${pct?fmt(val,true):fmt(val)}</div><div class="sub ${cls}">${sub==null?'':`同比 ${sub>=0?'+':''}${fmt(sub,true)}`}</div></div>`
  }).join('');
  $('#insights').innerHTML=analysis.insights.map(x=>`<div class="insight ${x.type}">${x.text}</div>`).join('');
  renderCharts();
  $('#status').textContent=`分析完成：识别 ${Object.keys(m).length} 个核心财务项目，覆盖 ${analysis.periods.length} 个期间。`;
}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id]}}
function renderCharts(){
  const p=analysis.periods,m=analysis.metrics,r=analysis.ratios;
  destroyChart('trend'); charts.trend=new Chart($('#trendChart'),{type:'line',data:{labels:p,datasets:[
    {label:'营业收入',data:m.revenue||[]},{label:'营业利润',data:m.operatingProfit||[]},{label:'净利润',data:m.netProfit||[]}
  ]},options:{responsive:true,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom'}}}});
  const last=analysis.periods.length-1,assets=m.totalAssets?.[last],ca=m.currentAssets?.[last];
  destroyChart('structure'); charts.structure=new Chart($('#structureChart'),{type:'doughnut',data:{labels:['流动资产','非流动资产'],datasets:[{data:[ca??0,(assets!=null&&ca!=null)?assets-ca:0]}]},options:{plugins:{legend:{position:'bottom'}}}});
  destroyChart('ratio'); charts.ratio=new Chart($('#ratioChart'),{type:'line',data:{labels:p,datasets:[
    {label:'毛利率',data:r.grossMargin.map(x=>x==null?null:x*100)},
    {label:'净利率',data:r.netMargin.map(x=>x==null?null:x*100)},
    {label:'资产负债率',data:r.debtRatio.map(x=>x==null?null:x*100)}
  ]},options:{plugins:{legend:{position:'bottom'}},scales:{y:{ticks:{callback:v=>v+'%'}}}}});
  destroyChart('cash'); charts.cash=new Chart($('#cashChart'),{type:'bar',data:{labels:p,datasets:[
    {label:'经营现金流',data:m.operatingCashFlow||[]},{label:'投资现金流',data:m.investingCashFlow||[]},{label:'筹资现金流',data:m.financingCashFlow||[]}
  ]},options:{plugins:{legend:{position:'bottom'}}}});
}
function renderSheetTabs(){
  const names=Object.keys(workbookData);
  $('#sheetTabs').innerHTML=names.map((n,i)=>`<span class="tab ${i===0?'active':''}" data-sheet="${escapeHtml(n)}">${escapeHtml(n)}</span>`).join('');
  if(names.length) renderTable(names[0]);
  $('#sheetTabs').onclick=e=>{
    const t=e.target.closest('.tab');if(!t)return;
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');renderTable(t.dataset.sheet);
  };
}
function renderTable(name){
  const rows=workbookData[name]||[];
  const max=Math.min(100,rows.length), width=Math.min(20,Math.max(0,...rows.slice(0,max).map(r=>r.length)));
  let h='<table><thead><tr>'+Array.from({length:width},(_,i)=>`<th>${colName(i)}</th>`).join('')+'</tr></thead><tbody>';
  for(let r=0;r<max;r++) h+='<tr>'+Array.from({length:width},(_,c)=>`<td>${escapeHtml(rows[r]?.[c]??'')}</td>`).join('')+'</tr>';
  h+='</tbody></table>'; $('#tableWrap').innerHTML=h;
}
function escapeHtml(v){return String(v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function loadFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{workbook=XLSX.read(e.target.result,{type:'array',cellDates:true});parseWorkbook(workbook);$('#status').textContent=`已导入：${file.name}`;}
    catch(err){$('#status').textContent='文件读取失败：'+err.message}
  };reader.readAsArrayBuffer(file);
}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function metricRows(){
  if(!analysis)return[];
  const p=analysis.periods,m=analysis.metrics,r=analysis.ratios,g=analysis.growth;
  const rows=[['指标',...p]];
  const add=(name,arr,pct=false)=>rows.push([name,...p.map((_,i)=>arr?.[i]==null?'':pct?Number((arr[i]*100).toFixed(4)):arr[i])]);
  add('营业收入',m.revenue);add('营业成本',m.cost);add('净利润',m.netProfit);add('总资产',m.totalAssets);add('总负债',m.totalLiabilities);
  add('经营现金流',m.operatingCashFlow);add('毛利率(%)',r.grossMargin,true);add('净利率(%)',r.netMargin,true);add('资产负债率(%)',r.debtRatio,true);
  add('流动比率',r.currentRatio);add('速动比率',r.quickRatio);add('ROE(%)',r.roe,true);add('ROA(%)',r.roa,true);add('收入增长率(%)',g.revenue,true);add('净利润增长率(%)',g.netProfit,true);
  return rows;
}
$('#fileInput').onchange=e=>e.target.files[0]&&loadFile(e.target.files[0]);
$('#dropzone').onclick=()=>$('#fileInput').click();
$('#dropzone').ondragover=e=>{e.preventDefault();$('#dropzone').classList.add('drag')};
$('#dropzone').ondragleave=()=>$('#dropzone').classList.remove('drag');
$('#dropzone').ondrop=e=>{e.preventDefault();$('#dropzone').classList.remove('drag');e.dataTransfer.files[0]&&loadFile(e.dataTransfer.files[0])};
$('#sheetSelect').onchange=updateColSelect;
$('#reanalyzeBtn').onclick=analyzeSelectedSheet;
$('#printReport').onclick=()=>window.print();
$('#resetBtn').onclick=()=>location.reload();
$('#exportJson').onclick=()=>analysis&&downloadBlob(new Blob([JSON.stringify(analysis,null,2)],{type:'application/json'}),'财务分析结果.json');
$('#exportCsv').onclick=()=>{
  if(!analysis)return;
  const csv=metricRows().map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  downloadBlob(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}),'财务指标分析.csv');
};
$('#exportExcel').onclick=()=>{
  if(!analysis)return;
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(metricRows()),'分析指标');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([['自动分析结论'],...analysis.insights.map(x=>[x.text])]),'分析结论');
  Object.entries(workbookData).forEach(([name,rows])=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),String(name).slice(0,31)));
  XLSX.writeFile(wb,'财务报表分析结果.xlsx');
};
$('#loadDemo').onclick=()=>{
  const rows=[
    ['项目','2023年','2024年','2025年'],
    ['营业收入',8200000,9800000,12500000],['营业成本',5400000,6200000,7600000],
    ['营业利润',950000,1380000,2050000],['净利润',720000,1030000,1510000],
    ['资产总计',10800000,12600000,15100000],['流动资产合计',5700000,6900000,8500000],
    ['货币资金',1600000,1900000,2600000],['存货',1400000,1680000,2100000],['应收账款',1750000,2200000,2650000],
    ['负债合计',5200000,5900000,6500000],['流动负债合计',3400000,3700000,4100000],
    ['所有者权益合计',5600000,6700000,8600000],
    ['经营活动产生的现金流量净额',780000,1200000,1780000],
    ['投资活动产生的现金流量净额',-650000,-900000,-1200000],
    ['筹资活动产生的现金流量净额',250000,150000,-100000]
  ];
  workbookData={'示例财务报表':rows};workbook=null;populateMapping();renderSheetTabs();autoAnalyzeAllSheets();$('#status').textContent='已加载示例数据。';
};
</script>
